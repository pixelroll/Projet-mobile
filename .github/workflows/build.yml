name: Build Android APK

# Déclencheurs : lancement manuel et à chaque push sur main
on:
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Rendre gradlew exécutable
        run: chmod +x ./gradlew

      - name: Décoder le keystore depuis les secrets
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > travel-release.jks

      - name: Créer keystore.properties
        run: |
          echo "storeFile=travel-release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Compiler l'APK (signé avec le keystore partagé)
        run: ./gradlew assembleDebug

      - name: Sauvegarder l'APK en Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Traveling-APK
          path: app/build/outputs/apk/debug/app-debug.apk
